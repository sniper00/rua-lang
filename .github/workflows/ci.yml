name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select stable Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add clippy
      - name: Parser conformance
        run: cargo test --locked -p rua-syntax parser_conformance
      - name: Range conformance
        run: cargo test --locked -p rua-syntax range_conformance
      - name: Compiler oracle
        run: cargo test --locked -p ruac
      - name: Workspace tests
        run: cargo test --locked --workspace --features rua-lsp/lsp
      - name: Clippy (rua-syntax)
        run: cargo clippy --locked -p rua-syntax --all-targets --no-deps -- -D warnings
      - name: Clippy (rua-analysis)
        run: cargo clippy --locked -p rua-analysis --all-targets --no-deps -- -D warnings
      - name: Clippy (rua-lsp)
        run: cargo clippy --locked -p rua-lsp --features lsp --all-targets --no-deps -- -D warnings
      - name: Boundary checks
        run: bash scripts/check-boundaries.sh
