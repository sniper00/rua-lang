version = 1

declarations = [
    "hashmap.ruai",
    "iter.ruai",
    "option.ruai",
    "result.ruai",
    "string.ruai",
    "vec.ruai",
]

runtime_sources = ["rua_std.lua"]

[runtime_helpers.format]
module = "rua_std"
export = "fmt"
alias = "fmt"
abi = 2

[runtime_helpers.number]
module = "rua_std"
export = "number"
alias = "number"
abi = 2

[lang_items]
option = "Option"
option_some = "Option::Some"
option_none = "Option::None"
option_map = "Option::map"
option_unwrap = "Option::unwrap"
option_expect = "Option::expect"
option_unwrap_or = "Option::unwrap_or"
option_is_some = "Option::is_some"
option_is_none = "Option::is_none"
result = "Result"
result_ok = "Result::Ok"
result_err = "Result::Err"
result_map = "Result::map"
result_unwrap = "Result::unwrap"
result_expect = "Result::expect"
result_unwrap_or = "Result::unwrap_or"
result_is_ok = "Result::is_ok"
result_is_err = "Result::is_err"

[[modules]]
name = "std::vec"
declaration = "vec.ruai"
runtime = "rua_std"
export = "vec"
alias = "vec"
abi = 2

[[modules]]
name = "std::hashmap"
declaration = "hashmap.ruai"
runtime = "rua_std"
export = "map"
alias = "map"
abi = 2

[[modules]]
name = "std::iter"
declaration = "iter.ruai"
runtime = "rua_std"
export = "iter"
alias = "iter"
abi = 2

[[modules]]
name = "std::string"
declaration = "string.ruai"
runtime = "rua_std"
export = "string"
alias = "string"
abi = 2
dispatch = "module"

[[modules]]
name = "std::result"
declaration = "result.ruai"
runtime = "rua_std"
export = "result"
alias = "result"
abi = 2
